name: Market Data Robot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-robot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Kodları indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Tüm geçmişi al ki çakışma olmasın

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Gerekli kütüphaneyi yükle
        run: pip install requests

      - name: Robotu Çalıştır
        run: python agent.py

      - name: Veriyi Zorla Kaydet (Force Update)
        run: |
          git config --global user.name 'Market-Robot'
          git config --global user.email 'robot@github.com'
          git add data.json
          # Eğer değişiklik yoksa hata vermeden geç:
          git commit -m "Robot: Yeni veriler eklendi" || exit 0
          # Çakışmaları görmezden gel ve zorla gönder (Force Push):
          git push origin main --force
