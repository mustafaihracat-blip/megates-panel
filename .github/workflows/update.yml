name: Market Data Robot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Kütüphaneleri Yükle
        run: pip install requests
        
      - name: Robotu Çalıştır
        run: python agent.py
        
      - name: Verileri Kaydet
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Robot: Guncel Veriler Eklendi"
          file_pattern: 'data.json'
