name: Market Data Robot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  run-robot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari indir
        uses: actions/checkout@v4
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Kutupaneleri Yukle
        run: pip install requests
        
      - name: Robotu Calistir
        run: python agent.py
        
      - name: Verileri Kaydet ve Cakismalari Coz
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Robot: Guncel Nijerya Verileri"
          file_pattern: 'data.json'
          branch: main # Eger branch adin main degilse burayi master yap
